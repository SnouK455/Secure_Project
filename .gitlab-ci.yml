stages:
  - lint
  - tests
  - sast
  - sca
  - build
  - container_scan
  - dast

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

cache:
  paths:
    - .cache/pip

default:
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -r requirements.txt

lint:
  stage: lint
  script:
    - pip install ruff
    - ruff check app tests

tests:
  stage: tests
  script:
    - pytest -q --disable-warnings --maxfail=1

bandit_sast:
  stage: sast
  script:
    - pip install bandit
    - bandit -r app -x tests -f txt

semgrep_sast:
  stage: sast
  image: semgrep/semgrep:latest
  before_script: []
  script:
    - semgrep --config auto app

pip_audit_sca:
  stage: sca
  script:
    - pip install pip-audit
    - pip-audit -r requirements.txt

build_image:
  stage: build
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  before_script: []
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"

trivy_container_scan:
  stage: container_scan
  image: aquasec/trivy:latest
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  before_script: []
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - trivy image --severity HIGH,CRITICAL --exit-code 1 "$IMAGE_TAG"
  needs:
    - build_image

dast_zap_baseline:
  stage: dast
  image: docker:27.3.1
  services:
    - docker:27.3.1-dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  before_script: []
  script:
    - docker build -t local-securenotes:ci .
    - docker run -d --name securenotes-app -p 8000:8000 -e DATABASE_URL=sqlite:////tmp/secure_notes.db -e SECRET_KEY=test_ci_secret_at_least_32_bytes local-securenotes:ci
    - |
      for attempt in $(seq 1 30); do
        if docker exec securenotes-app wget -q -O - http://127.0.0.1:8000/health | grep -q '"status":"ok"'; then
          exit 0
        fi
        sleep 1
      done
      docker logs securenotes-app
      exit 1
    - docker run --rm --network host -v "$CI_PROJECT_DIR/infra/zap:/zap/wrk" zaproxy/zap-stable:latest zap-baseline.py --autooff -t http://127.0.0.1:8000 -m 2 -I -c /zap/wrk/baseline.conf
