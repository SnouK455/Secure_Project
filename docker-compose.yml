services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securenotes}
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d securenotes -h localhost"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 20s

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-securenotes}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  tests:
    build: .
    working_dir: /app
    command: pytest -q
    environment:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: test_secret_for_ci_at_least_32_bytes
      PYTHONPATH: /app
    volumes:
      - .:/app

volumes:
  postgres_data:
