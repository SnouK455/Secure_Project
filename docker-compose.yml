services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: securenotes
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: strongpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d securenotes -h localhost"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 20s

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://appuser:strongpassword@db:5432/securenotes
      SECRET_KEY: bc9f2d1671de7b114d815fdd011141b9a9048606d0a292f9cf29f320c5191fff
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  tests:
    build: .
    working_dir: /app
    command: pytest -q
    environment:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: test_secret_for_ci_at_least_32_bytes
      PYTHONPATH: /app
    volumes:
      - .:/app

volumes:
  postgres_data:
